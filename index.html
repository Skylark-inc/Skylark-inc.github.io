<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Button</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: white;
  }

  button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    background: white;
    color: #1e3c72;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }
</style>
</head>

<body>
  <div class="card">
    <h2 id="text">Press the button</h2>
    <button onclick="changeText()">Click me</button>
  </div>

<script>
function changeText() {
  const text = document.getElementById("text");

  const messages = [
    "It works 😈",
    "GitHub didn’t break it",
    "Your CSS is alive",
    "You clicked it again huh",
    "Alright stop clicking now 😂"
  ];

  text.innerText = messages[Math.floor(Math.random() * messages.length)];
}
</script>
</body>
</html>
